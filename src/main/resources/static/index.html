<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="logo">
            <span class="icon">🎬</span> Movie Recommendation System
        </div>
        <div class="nav-links">
            <a href="#" class="active" onclick="showSection('recommend', event)">Recommendations</a>
            <a href="#" onclick="showSection('add', event)">Add Movie</a>
            <a href="#" onclick="showSection('all', event)">All Movies</a>
        </div>
    </nav>

    <main class="container">
        <!-- Recommendations Section -->
        <section id="recommend-section" class="active-section">
            <div class="hero">
                <h1>Find Your Next <span class="highlight">Favorite Movie</span></h1>
                <p>Select a genre to get personalized, highly-rated recommendations.</p>

                <div class="search-box">
                    <select id="genre-select">
                        <option value="Action">Action</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Animation">Animation</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Horror">Horror</option>
                        <option value="Romance">Romance</option>
                    </select>
                    <button id="recommend-btn" onclick="fetchRecommendations()">Get Recommendations</button>
                </div>
            </div>

            <div id="recommendations-results" class="movie-grid">
                <!-- Movie cards will be injected here -->
            </div>
        </section>

        <!-- Add Movie Section -->
        <section id="add-section" style="display: none;">
            <div class="card form-card">
                <h2>Add a New Movie</h2>
                <form id="add-movie-form" onsubmit="addMovie(event)">
                    <div class="form-group">
                        <label for="title">Movie Title</label>
                        <input type="text" id="title" required placeholder="e.g. The Matrix">
                    </div>
                    <div class="form-group">
                        <label for="genre">Genre</label>
                        <select id="genre" required>
                            <option value="Action">Action</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Animation">Animation</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Drama">Drama</option>
                            <option value="Horror">Horror</option>
                            <option value="Romance">Romance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="rating">Rating (0-10)</label>
                        <input type="number" id="rating" min="0" max="10" step="0.1" required placeholder="e.g. 8.5">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3" placeholder="Brief synopsis..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl">Image URL (Optional)</label>
                        <input type="url" id="imageUrl" placeholder="https://images.unsplash.com/...">
                    </div>
                    <button type="submit" class="submit-btn">Save Movie</button>
                </form>
            </div>
        </section>

        <!-- All Movies Section -->
        <section id="all-section" style="display: none;">
            <div class="section-header">
                <h2>All Movies in Database</h2>
                <button onclick="fetchAllMovies()" class="refresh-btn">🔄 Refresh</button>
            </div>
            <div id="all-movies-results" class="movie-grid">
                <!-- Movie cards will be injected here -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
